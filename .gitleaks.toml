title = "suppl.ai gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "gemini-api-key"
description = "Google Gemini API key"
regex = '''AIzaSy[A-Za-z0-9_-]{33}'''
tags = ["key","gemini"]

[[rules]]
id = "tavily-api-key"
description = "Tavily API key"
regex = '''tvly-(?:dev-|prod-)?[A-Za-z0-9]{32,}'''
tags = ["key","tavily"]
